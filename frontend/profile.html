<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Legal Advisor - Profile</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Stylesheets -->
    <link href="css/style.css" rel="stylesheet">
    <link href="css/responsive.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar glass-panel" id="app-sidebar">
            <div class="sidebar-logo">
                <span class="fs-4">⚖️</span>
                <span class="fw-bold gradient-text">Advisor AI</span>
            </div>
            <ul class="sidebar-menu">
                <li class="menu-item"><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                <li class="menu-item"><a href="query.html"><i class="fa-solid fa-lightbulb"></i> Legal Query</a></li>
                <li class="menu-item"><a href="fir.html"><i class="fa-solid fa-file-invoice"></i> FIR Analysis</a></li>
                <li class="menu-item"><a href="notice.html"><i class="fa-solid fa-magnifying-glass-chart"></i> Notice Analysis</a></li>
                <li class="menu-item"><a href="chat.html"><i class="fa-solid fa-comments"></i> Case Chat</a></li>
                <li class="menu-item" id="admin-dashboard-link" style="display:none;"><a href="history.html"><i class="fa-solid fa-table-list"></i> History & Logs</a></li>
                <li class="menu-item active"><a href="profile.html"><i class="fa-solid fa-circle-user"></i> Profile</a></li>
                <li class="menu-item"><a href="settings.html"><i class="fa-solid fa-gears"></i> Settings</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <div class="fw-semibold text-light small" id="user-profile-name">Username</div>
                        <div class="text-muted" style="font-size: 11px;" id="user-profile-role">User</div>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="main-content">
            <!-- Topbar Header -->
            <div class="top-bar glass-panel">
                <div class="d-flex align-items-center">
                    <button class="top-bar-toggle me-3" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                    <h4 class="mb-0 fw-bold">👤 User Profile</h4>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <span class="badge bg-success border border-success-subtle">🟢 System Online</span>
                </div>
            </div>

            <!-- Page Body Content -->
            <div class="page-body container-fluid fade-in">
                <div class="row g-4 justify-content-center">
                    <!-- Profile Information Card -->
                    <div class="col-lg-5">
                        <div class="glass-panel p-4 h-100 text-center">
                            <i class="fa-solid fa-circle-user text-warning mb-3" style="font-size: 96px;"></i>
                            <h4 class="fw-bold mb-1 gradient-text" id="profile-display-name">Advocate Profile</h4>
                            <span class="badge bg-dark border border-secondary text-warning mb-4" id="profile-role-badge">User</span>
                            
                            <div class="text-start">
                                <div class="mb-3">
                                    <label class="form-label text-muted small">Username</label>
                                    <input type="text" class="form-control bg-dark border-secondary text-light" id="profile-username" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">Registered Email</label>
                                    <input type="text" class="form-control bg-dark border-secondary text-light" id="profile-email" readonly>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Change Password Form -->
                    <div class="col-lg-5">
                        <div class="glass-panel p-4 h-100">
                            <h4 class="fw-bold mb-3 text-warning"><i class="fa-solid fa-key me-2"></i> Update Credentials</h4>
                            
                            <div id="profile-alert-container"></div>
                            
                            <form id="change-password-form">
                                <div class="mb-3">
                                    <label for="old-password" class="form-label text-muted">Current Password</label>
                                    <input type="password" class="form-control" id="old-password" required placeholder="Enter current password">
                                </div>
                                <div class="mb-3">
                                    <label for="new-password" class="form-label text-muted">New Password</label>
                                    <input type="password" class="form-control" id="new-password" required placeholder="Enter new password (min 6 chars)">
                                </div>
                                <div class="mb-3">
                                    <label for="confirm-password" class="form-label text-muted">Confirm New Password</label>
                                    <input type="password" class="form-control" id="confirm-password" required placeholder="Confirm new password">
                                </div>
                                <button type="submit" class="btn gradient-btn w-100 mt-4 py-2"><i class="fa-solid fa-save me-2"></i> Save New Password</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/profile.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('app-sidebar').classList.toggle('active');
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('username') || 'Advocate';
            const display = document.getElementById('profile-display-name');
            if (display) display.textContent = user;
        });
    </script>
</body>
</html>
